<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎂 শুভ জন্মদিন পাঁচি!</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      background: linear-gradient(135deg, #ffd1dc, #ffb6c1, #dda0dd, #ff8fab);
      background-size: 400% 400%;
      animation: gradientShift 10s ease infinite;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Arial', 'Noto Sans Bengali', sans-serif;
      overflow: hidden;
      position: relative;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Floating hearts and balloons */
    .float-item {
      position: absolute;
      bottom: -80px;
      animation: floatUp var(--duration) linear infinite;
      font-size: var(--size);
      opacity: 0.8;
      pointer-events: none;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0.9;
      }
      50% {
        opacity: 0.6;
      }
      100% {
        transform: translateY(-110vh) rotate(360deg);
        opacity: 0;
      }
    }

    /* Message box */
    .message-box {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(12px);
      border-radius: 30px;
      padding: 30px 40px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
      z-index: 10;
      margin-bottom: 20px;
      animation: fadeInScale 2s ease;
    }

    @keyframes fadeInScale {
      0% {
        opacity: 0;
        transform: scale(0.8);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    .message-box h1 {
      font-size: 3rem;
      color: #b0306a;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
    }

    .message-box .line {
      font-size: 1.6rem;
      color: #5d1049;
      margin: 8px 0;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
    }

    /* Photo container (initially hidden) */
    .photo-container {
      z-index: 10;
      margin-top: 20px;
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(10px);
      border-radius: 50%;
      padding: 10px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.2);
      opacity: 0;
      transform: scale(0);
      transition: all 1s ease-in-out;
    }

    .photo-container.show {
      opacity: 1;
      transform: scale(1);
    }

    .photo-container img {
      width: 200px;
      height: 200px;
      object-fit: cover;
      border-radius: 50%;
      display: block;
    }

    /* Signature */
    .signature {
      margin-top: 15px;
      font-size: 1.4rem;
      color: white;
      text-shadow: 2px 2px 4px #00000040;
      z-index: 10;
    }
  </style>
</head>
<body>

  <!-- Floating elements will be generated by JS -->

  <div class="message-box">
    <h1>🎉💖 শুভ জন্মদিন পাঁচি! 🎂</h1>
    <div class="line">তোর জীবনের প্রতিটা দিন হাসি, আনন্দ আর</div>
    <div class="line">ভালোবাসায় ভরে উঠুক।</div>
    <div class="line">সব স্বপ্ন পূরণ হোক, আর তুই সবসময়</div>
    <div class="line">এভাবেই খুশি থাকিস। ✨</div>
    <div class="line">অনেক অনেক ভালোবাসা আর শুভেচ্ছা</div>
    <div class="line">রইলো তোর জন্য! 🥰</div>
  </div>

  <div class="photo-container" id="photoBox">
    <!-- ছবি দেখাবে এখানে (নাম birthday.jpeg) -->
    <img src="birthday.jpeg" alt="Panchi Didi" id="photoImg">
  </div>

  <div class="signature">— তোর ভাইয়ের পক্ষ থেকে ❤️</div>

  <script>
    // Floating hearts and balloons
    function createFloatingElements() {
      const items = ['❤️', '🎈', '💖', '🎈', '💕', '🎈', '💗', '🎈'];
      for (let i = 0; i < 35; i++) {
        const el = document.createElement('span');
        el.className = 'float-item';
        el.textContent = items[Math.floor(Math.random() * items.length)];
        el.style.setProperty('--size', Math.random() * 25 + 18 + 'px');
        el.style.setProperty('--duration', Math.random() * 5 + 6 + 's');
        el.style.left = Math.random() * 100 + '%';
        el.style.animationDelay = Math.random() * 5 + 's';
        document.body.appendChild(el);
      }
    }

    // Photo reveal after 5 seconds
    window.addEventListener('load', () => {
      createFloatingElements();
      setTimeout(() => {
        const photoBox = document.getElementById('photoBox');
        if (photoBox) {
          photoBox.classList.add('show');
        }
      }, 5000);
    });
  </script>
</body>
</html>
